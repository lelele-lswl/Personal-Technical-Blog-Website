services:
  mysql:
    image: mysql:8.0
    container_name: personal-web-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - personal-web-net

  backend:
    image: ${BACKEND_IMAGE}
    container_name: personal-web-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY}
      ZHIPUAI_MODEL: ${ZHIPUAI_MODEL}
      ZHIPUAI_MAX_TOKENS: ${ZHIPUAI_MAX_TOKENS}
      ZHIPUAI_TEMPERATURE: ${ZHIPUAI_TEMPERATURE}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - personal-web-net

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: personal-web-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - personal-web-net

volumes:
  mysql-data:

networks:
  personal-web-net:
    driver: bridge