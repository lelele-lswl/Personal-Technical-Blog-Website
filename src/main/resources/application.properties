spring.application.name=PersonalWeb

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/personal_web?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=8080

zhipuai.api.key=${ZHIPUAI_API_KEY:}
zhipuai.model=${ZHIPUAI_MODEL:glm-4-flash}
zhipuai.max-tokens=${ZHIPUAI_MAX_TOKENS:2000}
zhipuai.temperature=${ZHIPUAI_TEMPERATURE:0.7}